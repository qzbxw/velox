services:
  bot:
    build: .
    container_name: velox_bot
    restart: always
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017
      - MONGO_DB_NAME=hyperliquid_bot
    mem_limit: 2g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bot_net

  mongo:
    image: mongo:7.0
    container_name: velox_mongo
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASS}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_net

networks:
  bot_net:
    driver: bridge

volumes:
  mongo_data:
