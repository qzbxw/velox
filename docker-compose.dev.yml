services:
  bot:
    build: .
    container_name: velox_bot_dev
    volumes:
      - .:/app
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=hyperliquid_bot
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bot_net
    command: ["watchfiles", "--filter", "python", "--target-type", "command", "python -m bot.main"]

  mongo:
    image: mongo:7.0
    container_name: velox_mongo_dev
    restart: always
    volumes:
      - velox_mongo_data_dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_net

networks:
  bot_net:
    driver: bridge

volumes:
  velox_mongo_data_dev:
